<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zhihuiti city</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #4a7a22; }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ── Parchment HUD panel ── */
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        pointer-events: none;
        background: #f5e6c8;
        border: 3px solid #8b6914;
        border-radius: 4px;
        padding: 12px 16px;
        min-width: 170px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
        font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
        font-size: 11px;
        color: #4a3520;
        line-height: 1.4;
      }
      .hud-title {
        font-size: 13px;
        font-weight: bold;
        color: #2d1a08;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }
      .hud-subtitle {
        font-size: 10px;
        font-weight: bold;
        color: #6b4c2a;
        margin-bottom: 2px;
      }
      .hud-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .hud-label { color: #7a6040; }
      .hud-val { color: #2d5016; font-weight: bold; }
      .hud-divider {
        height: 1px;
        background: #c4a76c;
        margin: 6px 0;
      }

      /* ── Agent tooltip (on hover) ── */
      #tooltip {
        display: none;
        position: fixed;
        z-index: 20;
        background: #f5e6c8;
        border: 2px solid #8b6914;
        border-radius: 3px;
        padding: 6px 10px;
        font-family: 'SF Mono', monospace;
        font-size: 10px;
        color: #4a3520;
        line-height: 1.5;
        pointer-events: none;
        box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        max-width: 200px;
      }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <div id="tooltip"></div>
    <canvas id="city"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
